<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC Processor Pro</title>
    <meta name="description" content="Procesador profesional de direcciones MAC">
    <meta name="theme-color" content="#667eea">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    
    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MAC Processor">
    
    <!-- Windows -->
    <meta name="msapplication-TileColor" content="#667eea">
    
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd8;
            --success: #10B981;
            --error: #DC2626;
            --warning: #F59E0B;
            --dark: #1F2937;
            --light: #F9FAFB;
            --surface: #FFFFFF;
            --gray-200: #E5E7EB;
            --gradient: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
            --radius: 10px;
        }

        .dark-mode {
            --primary: #7c3aed;
            --surface: #1F2937;
            --dark: #111827;
            --light: #374151;
            --gray-200: #4B5563;
        }

        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s;
        }

        /* ===== LAYOUT ===== */
        .container {
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        /* ===== CONTROLES ===== */
        .controls-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .theme-btn, .stats-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: background 0.3s;
        }

        .theme-btn:hover, .stats-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ===== FORM ===== */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 16px;
            font-family: 'Courier New', monospace;
            background: var(--surface);
            color: var(--dark);
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* ===== BOTONES ===== */
        .btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.3s, transform 0.2s;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-success {
            background: var(--success);
        }

        .btn-success:hover {
            background: #0da271;
        }

        .btn-install {
            background: var(--warning);
            margin-top: 10px;
        }

        /* ===== ALERTAS ===== */
        .alert {
            padding: 15px;
            border-radius: var(--radius);
            margin-bottom: 15px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #FEF2F2;
            color: var(--error);
            border-left: 4px solid var(--error);
        }

        .alert-success {
            background: #F0FFF4;
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        /* ===== RESULTADO ===== */
        .result {
            background: var(--light);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid var(--success);
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .result.show {
            display: block;
        }

        .result-code {
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 2px dashed var(--gray-200);
            word-break: break-all;
            user-select: all;
        }

        /* ===== ESTADO ===== */
        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--dark);
            padding: 12px;
            background: var(--light);
            border-radius: var(--radius);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            color: white;
            margin-top: 25px;
            opacity: 0.8;
            font-size: 14px;
        }

        .footer-links {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: white;
            text-decoration: none;
            opacity: 0.7;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .footer-links a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .header {
                padding: 25px 20px;
            }
            
            .content {
                padding: 25px 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .result-code {
                font-size: 18px;
                padding: 12px;
            }

            .controls-top {
                flex-direction: column;
                gap: 10px;
            }

            .theme-btn, .stats-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="controls-top">
                    <button class="theme-btn" id="themeBtn">
                        🌓 Tema
                    </button>
                    <button class="stats-btn" id="statsBtn">
                        📊 Estadísticas
                    </button>
                </div>
                
                <h1>🔧 MAC Processor Pro</h1>
                <p>Procesador de direcciones MAC</p>
            </div>
            
            <div class="content">
                <!-- Formulario -->
                <div class="input-group">
                    <label for="macInput">Dirección MAC:</label>
                    <input type="text" id="macInput" placeholder='Ej: "00:1A:2B:3C:4D:5E"' autofocus>
                </div>

                <div class="input-group">
                    <label for="digitInput">Último dígito:</label>
                    <input type="text" id="digitInput" maxlength="1" placeholder="Ej: C">
                </div>

                <button class="btn" id="processBtn">
                    <span>🚀</span> Procesar MAC
                </button>

                <!-- Botón instalación -->
                <div id="installContainer"></div>

                <!-- Alertas -->
                <div class="alert alert-error" id="errorAlert">
                    <span id="errorText"></span>
                </div>

                <div class="alert alert-success" id="successAlert">
                    <span id="successText"></span>
                </div>

                <!-- Resultado -->
                <div class="result" id="resultSection">
                    <div style="text-align: center; margin-bottom: 15px;">
                        <strong>✅ Resultado procesado:</strong>
                    </div>
                    <div class="result-code" id="resultCode"></div>
                    <button class="btn btn-success" id="copyBtn">
                        <span>📋</span> Copiar resultado
                    </button>
                </div>

                <!-- Estado -->
                <div class="status" id="status">
                    Estado: Inicializando...
                </div>
            </div>
        </div>

        <div class="footer">
            <p>MAC Processor Pro &copy; 2025</p>
            <div class="footer-links">
                <a id="shortcutsBtn">Atajos</a>
                <a id="aboutBtn">Acerca de</a>
                <a id="clearBtn">Limpiar</a>
            </div>
        </div>
    </div>

    <script>
        // ===== VERSIÓN =====
        const APP_VERSION = '3.2';
        
        // ===== FUNCIONES BÁSICAS =====
        function procesarMAC(mac, digito) {
            // Limpiar
            let limpia = mac.replace(/["'()\s]/g, '');
            let digitos = limpia.replace(/[:.-]/g, '');
            
            // Validar
            if (digitos.length !== 12) {
                throw new Error('La MAC debe tener 12 dígitos');
            }
            
            if (!/^[0-9A-Fa-f]{12}$/.test(digitos)) {
                throw new Error('La MAC debe ser hexadecimal');
            }
            
            if (!/^[0-9A-Fa-f]$/.test(digito)) {
                throw new Error('El dígito debe ser 0-9 o A-F');
            }
            
            // Procesar
            digitos = digitos.toUpperCase();
            const ultimos10 = digitos.substring(2);
            const resultado = ultimos10.substring(0, 9) + digito.toUpperCase();
            
            return resultado;
        }
        
        // ===== INTERFAZ =====
        function showAlert(type, message, autoHide = true) {
            const alert = document.getElementById(type === 'error' ? 'errorAlert' : 'successAlert');
            const text = document.getElementById(type === 'error' ? 'errorText' : 'successText');
            
            // Ocultar otra alerta
            const otherAlert = type === 'error' ? 'successAlert' : 'errorAlert';
            document.getElementById(otherAlert).classList.remove('show');
            
            // Mostrar esta alerta
            text.textContent = message;
            alert.classList.add('show');
            
            // Auto-ocultar si es éxito
            if (autoHide && type === 'success') {
                setTimeout(() => {
                    alert.classList.remove('show');
                }, 3000);
            }
        }
        
        function showResult(text) {
            const section = document.getElementById('resultSection');
            const code = document.getElementById('resultCode');
            
            code.textContent = text;
            section.classList.add('show');
            
            // Scroll suave
            setTimeout(() => {
                section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }
        
        function updateStatus(message) {
            const status = document.getElementById('status');
            if (status) {
                status.textContent = `Estado: ${message}`;
            }
        }
        
        // ===== TEMA =====
        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.contains('dark-mode');
            
            if (isDark) {
                body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
                showAlert('success', 'Modo claro activado');
            } else {
                body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
                showAlert('success', 'Modo oscuro activado');
            }
        }
        
        function loadTheme() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.body.classList.add('dark-mode');
            }
        }
        
        // ===== PWA =====
        let deferredPrompt;
        
        function setupPWA() {
            // Service Worker
            if ('serviceWorker' in navigator) {
                const swPath = window.location.hostname.includes('github.io') 
                    ? '/mac-processor-pro-main/sw.js' 
                    : 'sw.js';
                
                navigator.serviceWorker.register(swPath)
                    .then(() => {
                        updateStatus('Service Worker activo');
                    })
                    .catch(err => {
                        console.error('Error SW:', err);
                        updateStatus('Service Worker offline');
                    });
            }
            
            // Instalación
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                showInstallButton();
                updateStatus('Lista para instalar');
            });
            
            window.addEventListener('appinstalled', () => {
                updateStatus('✓ App instalada');
                document.getElementById('installContainer').innerHTML = '';
            });
            
            // Verificar si ya está instalada
            if (window.matchMedia('(display-mode: standalone)').matches) {
                updateStatus('✓ App instalada');
            }
            
            // Estado de red
            window.addEventListener('online', () => updateStatus('En línea'));
            window.addEventListener('offline', () => updateStatus('Offline'));
            updateStatus(navigator.onLine ? 'En línea' : 'Offline');
        }
        
        function showInstallButton() {
            if (deferredPrompt && !window.matchMedia('(display-mode: standalone)').matches) {
                const container = document.getElementById('installContainer');
                const btn = document.createElement('button');
                btn.className = 'btn btn-install';
                btn.innerHTML = '📲 Instalar App';
                
                btn.addEventListener('click', async () => {
                    if (!deferredPrompt) return;
                    
                    deferredPrompt.prompt();
                    const result = await deferredPrompt.userChoice;
                    
                    if (result.outcome === 'accepted') {
                        updateStatus('Instalando...');
                    }
                    
                    deferredPrompt = null;
                    btn.remove();
                });
                
                container.innerHTML = '';
                container.appendChild(btn);
            }
        }
        
        // ===== ESTADÍSTICAS =====
        function getStats() {
            const processes = parseInt(localStorage.getItem('totalProcesses') || '0');
            const copies = parseInt(localStorage.getItem('totalCopies') || '0');
            const errors = parseInt(localStorage.getItem('totalErrors') || '0');
            
            const successRate = processes > 0 ? ((processes - errors) / processes * 100).toFixed(1) : 0;
            
            return {
                processes,
                copies,
                errors,
                successRate
            };
        }
        
        function showStats() {
            const stats = getStats();
            
            alert(`📊 Estadísticas de uso:\n\n` +
                  `Procesamientos: ${stats.processes}\n` +
                  `Copias realizadas: ${stats.copies}\n` +
                  `Errores: ${stats.errors}\n` +
                  `Tasa de éxito: ${stats.successRate}%\n\n` +
                  `Datos guardados localmente.`);
        }
        
        function recordProcess() {
            const current = parseInt(localStorage.getItem('totalProcesses') || '0');
            localStorage.setItem('totalProcesses', (current + 1).toString());
        }
        
        function recordCopy() {
            const current = parseInt(localStorage.getItem('totalCopies') || '0');
            localStorage.setItem('totalCopies', (current + 1).toString());
        }
        
        function recordError() {
            const current = parseInt(localStorage.getItem('totalErrors') || '0');
            localStorage.setItem('totalErrors', (current + 1).toString());
        }
        
        // ===== FUNCIONES DE LA APLICACIÓN =====
        function processMAC() {
            const mac = document.getElementById('macInput').value.trim();
            const digit = document.getElementById('digitInput').value.trim().toUpperCase();
            
            // Ocultar resultados anteriores
            document.getElementById('errorAlert').classList.remove('show');
            document.getElementById('successAlert').classList.remove('show');
            document.getElementById('resultSection').classList.remove('show');

            // Validaciones
            if (!mac) {
                showAlert('error', 'Por favor ingresa una dirección MAC');
                recordError();
                return;
            }

            if (!digit) {
                showAlert('error', 'Por favor ingresa el último dígito');
                recordError();
                return;
            }

            if (!/^[0-9A-F]$/.test(digit)) {
                showAlert('error', 'El
