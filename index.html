<html>
<head>
    <title>MAC Address Processor</title>
    <script>
        // Function to validate MAC address format
        function isValidMacAddress(mac) {
            const regex = /^(?:[0-9A-Fa-f]{2}[:-]){5}(?:[0-9A-Fa-f]{2})$/;
            return regex.test(mac);
        }

        // Function to process MAC address
        function processMacAddress() {
            const inputField = document.getElementById('macInput');
            const resultField = document.getElementById('result');
            const macAddress = inputField.value;

            if (isValidMacAddress(macAddress)) {
                resultField.innerHTML = 'Valid MAC Address: ' + macAddress;
            } else {
                resultField.innerHTML = 'Invalid MAC Address! Please enter a valid one.';
            }
        }

        // Event listener for button click
        window.onload = function() {
            const submitButton = document.getElementById('submitButton');
            submitButton.addEventListener('click', processMacAddress);
        };
    </script>
</head>
<body>
    <h1>MAC Address Processor</h1>
    <input type="text" id="macInput" placeholder="Enter MAC Address" />
    <button id="submitButton">Submit</button>
    <div id="result"></div>
</body>
</html>
